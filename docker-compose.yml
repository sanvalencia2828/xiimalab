      HEADLESS: "true"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    shm_size: '256m'
    networks:
      - xiima-net

  # ─────────────────────────────────────────────
  # Agent Crew — 4 agentes colaborativos (Scout→Analyzer→Oracle→Writer)
  # ─────────────────────────────────────────────
  agent-crew:
    build:
      context: ./engine
      dockerfile: Dockerfile
    restart: unless-stopped
    command: python agent_crew.py --loop 3600
    environment:
      DATABASE_URL:          postgresql://xiima:${POSTGRES_PASSWORD}@db:5432/xiimalab
      ML_MODEL:              all-MiniLM-L6-v2
      AGENT_TOP_MATCHES:     ${AGENT_TOP_MATCHES:-3}
      AGENT_MIN_SCORE:       ${AGENT_MIN_SCORE:-40}
      AGENT_INSIGHT_TTL_DAYS: ${AGENT_INSIGHT_TTL_DAYS:-14}
    depends_on:
      db:
        condition: service_healthy
    mem_limit: 512m
    networks:
      - xiima-net

  # ─────────────────────────────────────────────
  # Payout Oracle — Única pieza con acceso a Hot Wallet
  # Escucha Supabase Realtime + polling de respaldo
  # ─────────────────────────────────────────────
  payout-oracle:
    build:
      context: ./engine
      dockerfile: Dockerfile
    restart: always          # 24/7 — critical service
    command: python payout_manager.py
    environment:
      DATABASE_URL:             postgresql://xiima:${POSTGRES_PASSWORD}@db:5432/xiimalab
      STELLAR_PLATFORM_SECRET:  ${STELLAR_PLATFORM_SECRET}   # Hot wallet — SECRETO
      STELLAR_NETWORK:          ${STELLAR_NETWORK:-testnet}
      SUPABASE_URL:             ${SUPABASE_URL:-}
      SUPABASE_SERVICE_KEY:     ${SUPABASE_SERVICE_KEY:-}     # Service Role Key
      MAX_RETRIES:              ${MAX_RETRIES:-3}
      POLL_INTERVAL_SEC:        ${POLL_INTERVAL_SEC:-30}
    depends_on:
      db:
        condition: service_healthy
    # Solo este contenedor tiene la secret key — aislamiento explícito
    security_opt:
      - no-new-privileges:true
    networks:
      - xiima-net

  # ─────────────────────────────────────────────
  # ML Matcher — Embeddings + MarketMatch con pgvector
  # ─────────────────────────────────────────────
  ml-matcher:
    build:
      context: ./engine
      dockerfile: Dockerfile
    restart: unless-stopped
    command: python ml_matcher.py
    environment:
      DATABASE_URL: postgresql://xiima:${POSTGRES_PASSWORD}@db:5432/xiimalab
      ML_MODEL: all-MiniLM-L6-v2
    depends_on:
      db:
        condition: service_healthy
    # El modelo pesa ~80MB RAM en CPU; 512MB es suficiente
    mem_limit: 512m
    networks:
      - xiima-net

  # ─────────────────────────────────────────────
  # Crew Monitor — Monitoreo de colaboración multi-agente
  # Dispara agent-crew cada MONITOR_INTERVAL segundos
  # y genera reportes de cómo colaboran los agentes
  # ─────────────────────────────────────────────
  crew-monitor:
    build:
      context: ./engine
      dockerfile: Dockerfile
    restart: unless-stopped
    command: python crew_monitor.py --interval 300
    environment:
      DATABASE_URL: postgresql://xiima:${POSTGRES_PASSWORD}@db:5432/xiimalab
      ML_MODEL: all-MiniLM-L6-v2
      MONITOR_INTERVAL: ${MONITOR_INTERVAL:-300}
    depends_on:
      db:
        condition: service_healthy
      agent-crew:
        condition: service_started
    networks:
      - xiima-net

