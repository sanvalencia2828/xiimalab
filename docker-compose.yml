services:
  # ─────────────────────────────────────────────
  # PostgreSQL 16 — Primary database
  # ─────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: xiimalab
      POSTGRES_USER: xiima
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./services/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U xiima -d xiimalab" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - xiima-net

  # ─────────────────────────────────────────────
  # Redis — Job queue / caching
  # ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - xiima-net

  # ─────────────────────────────────────────────
  # FastAPI — REST backend
  # ─────────────────────────────────────────────
  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://xiima:${POSTGRES_PASSWORD}@db:5432/xiimalab
      REDIS_URL: redis://redis:6379
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ENVIRONMENT: production
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - xiima-net

  # ─────────────────────────────────────────────
  # DoraHacks Scraper — Background bot
  # ─────────────────────────────────────────────
  scraper:
    build:
      context: ./services/scraper
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://xiima:${POSTGRES_PASSWORD}@db:5432/xiimalab
      REDIS_URL: redis://redis:6379
      SCRAPER_INTERVAL_MINUTES: ${SCRAPER_INTERVAL_MINUTES:-30}
      HEADLESS: "true"
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_healthy
    # Allocate shared memory for Chromium
    shm_size: '256m'
    networks:
      - xiima-net

  # ─────────────────────────────────────────────
  # Devpost Scraper — Antigravity engine
  # ─────────────────────────────────────────────
  devpost:
    build:
      context: ./services/scraper
      dockerfile: Dockerfile
    restart: unless-stopped
    command: python devpost_engine.py
    environment:
      DATABASE_URL: postgresql://xiima:${POSTGRES_PASSWORD}@db:5432/xiimalab
      HEADLESS: "true"
    depends_on:
      db:
        condition: service_healthy
    shm_size: '256m'
    networks:
      - xiima-net

  # ─────────────────────────────────────────────
  # SNAP Engine — Scraper multi-fuente (Devpost + DoraHacks + Devfolio)
  # ─────────────────────────────────────────────
  snap-engine:
    build:
      context: ./services/scraper
      dockerfile: Dockerfile
    restart: unless-stopped
    command: python snap_engine.py
    environment:
      DATABASE_URL: postgresql://xiima:${POSTGRES_PASSWORD}@db:5432/xiimalab
      REDIS_URL: redis://redis:6379
      DEVFOLIO_MCP_API_KEY: ${DEVFOLIO_MCP_API_KEY}
      SNAP_INTERVAL_HOURS: ${SNAP_INTERVAL_HOURS:-12}
      HEADLESS: "true"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    shm_size: '256m'
    networks:
      - xiima-net

  # ─────────────────────────────────────────────
  # Agent Crew — 4 agentes colaborativos (Scout→Analyzer→Oracle→Writer)
  # ─────────────────────────────────────────────
  agent-crew:
    build:
      context: ./engine
      dockerfile: Dockerfile
    restart: unless-stopped
    command: python agent_crew.py --loop 3600
    environment:
      DATABASE_URL:          postgresql://xiima:${POSTGRES_PASSWORD}@db:5432/xiimalab
      ML_MODEL:              all-MiniLM-L6-v2
      AGENT_TOP_MATCHES:     ${AGENT_TOP_MATCHES:-3}
      AGENT_MIN_SCORE:       ${AGENT_MIN_SCORE:-40}
      AGENT_INSIGHT_TTL_DAYS: ${AGENT_INSIGHT_TTL_DAYS:-14}
    depends_on:
      db:
        condition: service_healthy
    mem_limit: 512m
    networks:
      - xiima-net

  # ─────────────────────────────────────────────
  # Payout Oracle — Única pieza con acceso a Hot Wallet
  # Escucha Supabase Realtime + polling de respaldo
  # ─────────────────────────────────────────────
  payout-oracle:
    build:
      context: ./engine
      dockerfile: Dockerfile
    restart: always          # 24/7 — critical service
    command: python payout_manager.py
    environment:
      DATABASE_URL:             postgresql://xiima:${POSTGRES_PASSWORD}@db:5432/xiimalab
      STELLAR_PLATFORM_SECRET:  ${STELLAR_PLATFORM_SECRET}   # Hot wallet — SECRETO
      STELLAR_NETWORK:          ${STELLAR_NETWORK:-testnet}
      SUPABASE_URL:             ${SUPABASE_URL:-}
      SUPABASE_SERVICE_KEY:     ${SUPABASE_SERVICE_KEY:-}     # Service Role Key
      MAX_RETRIES:              ${MAX_RETRIES:-3}
      POLL_INTERVAL_SEC:        ${POLL_INTERVAL_SEC:-30}
    depends_on:
      db:
        condition: service_healthy
    # Solo este contenedor tiene la secret key — aislamiento explícito
    security_opt:
      - no-new-privileges:true
    networks:
      - xiima-net

  # ─────────────────────────────────────────────
  # ML Matcher — Embeddings + MarketMatch con pgvector
  # ─────────────────────────────────────────────
  ml-matcher:
    build:
      context: ./engine
      dockerfile: Dockerfile
    restart: unless-stopped
    command: python ml_matcher.py
    environment:
      DATABASE_URL: postgresql://xiima:${POSTGRES_PASSWORD}@db:5432/xiimalab
      ML_MODEL: all-MiniLM-L6-v2
    depends_on:
      db:
        condition: service_healthy
    # El modelo pesa ~80MB RAM en CPU; 512MB es suficiente
    mem_limit: 512m
    networks:
      - xiima-net

  # ─────────────────────────────────────────────
  # Skill Validator — El Vigilante de Proof of Skill
  # Vigila is_completed=TRUE y ejecuta ClaimCB + Payment en Stellar
  # ─────────────────────────────────────────────
  skill-validator:
    build:
      context: ./engine
      dockerfile: Dockerfile
    restart: unless-stopped
    command: python skill_validator.py
    environment:
      DATABASE_URL: postgresql://xiima:${POSTGRES_PASSWORD}@db:5432/xiimalab
      STELLAR_NETWORK: ${STELLAR_NETWORK:-testnet}
      STELLAR_SECRET_KEY: ${STELLAR_SECRET_KEY}
      VALIDATOR_INTERVAL_SEC: ${VALIDATOR_INTERVAL_SEC:-60}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - xiima-net

  # ─────────────────────────────────────────────
  # Staking Monitor — libera escrows automáticamente
  # ─────────────────────────────────────────────
  staking-monitor:
    build:
      context: ./engine
      dockerfile: Dockerfile
    restart: unless-stopped
    command: python staking_manager.py
    environment:
      DATABASE_URL: postgresql://xiima:${POSTGRES_PASSWORD}@db:5432/xiimalab
      STELLAR_NETWORK: ${STELLAR_NETWORK:-testnet}
      STELLAR_SECRET_KEY: ${STELLAR_SECRET_KEY}
      AURA_IMAGES_MILESTONE: ${AURA_IMAGES_MILESTONE:-10}
      ESCROW_TIMEOUT_DAYS: ${ESCROW_TIMEOUT_DAYS:-180}
      STAKING_MONITOR_INTERVAL_SEC: 60
    depends_on:
      db:
        condition: service_healthy
    networks:
      - xiima-net

  # ─────────────────────────────────────────────
  # Devfolio MCP Scraper — Tiempo real vía MCP
  # ─────────────────────────────────────────────
  devfolio:
    build:
      context: ./services/scraper
      dockerfile: Dockerfile
    restart: unless-stopped
    command: python devfolio_mcp.py
    environment:
      DATABASE_URL: postgresql://xiima:${POSTGRES_PASSWORD}@db:5432/xiimalab
      REDIS_URL: redis://redis:6379
      DEVFOLIO_MCP_API_KEY: ${DEVFOLIO_MCP_API_KEY}
      DEVFOLIO_INTERVAL_MINUTES: ${DEVFOLIO_INTERVAL_MINUTES:-15}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - xiima-net

  # ─────────────────────────────────────────────
  # Next.js Frontend
  # ─────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://api:8000
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - xiima-net

volumes:
  pgdata:


networks:
  xiima-net:
    driver: bridge
