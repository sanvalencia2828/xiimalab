version: '3.8'

services:
  # Base de Datos (Solo para entorno local si no se usa Supabase)
  db:
    image: postgres:15
    container_name: xiima_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-xiima_pass}
      POSTGRES_DB: xiimalab
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  # Backend - Cerebro y Match Engine
  api:
    build: ./services/api
    container_name: xiima_api
    restart: always
    env_file: .env
    depends_on:
      - db
    ports:
      - "8000:8000"
    environment:
      - SCRAPER_URL=http://scraper:9000

  # Frontend - Dashboard de Next.js
  frontend:
    build: ./frontend
    container_name: xiima_frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000

  # Automatizacion - Snap Engine (Puppeteer)
  automation:
    build: ./services/automation
    container_name: xiima_automation
    volumes:
      - ./snapshots:/app/snapshots
    env_file: .env
    depends_on:
      - frontend
      - api

  # Scraper - Motor de recolección de Hackatones
  scraper:
    build: ./services/scraper
    container_name: xiima_scraper
    restart: always
    env_file: .env
    depends_on:
      - db
    environment:
      - SCRAPER_URL=http://scraper:9000
      - NEXT_PUBLIC_API_URL=http://api:8000

  # Microservicio Externo - RedimensionAI
  redimension_ai:
    image: sanvalencia2828/redimension-ai:latest
    container_name: redimension_engine
    ports:
      - "8001:8001"
    restart: always

volumes:
  postgres_data:
