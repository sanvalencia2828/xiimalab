version: '3.8'

services:
  # Base de Datos (Solo para entorno local si no se usa Supabase)
  db:
    image: postgres:15
    container_name: xiima_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-xiima_pass}
      POSTGRES_DB: xiimalab
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  # Backend - Cerebro y Match Engine
  api:
    build: ./services/api
    container_name: xiima_api
    restart: always
    env_file: .env
    depends_on:
      - db
    ports:
      - "8000:8000"
    environment:
      - SCRAPER_URL=http://scraper:9000

